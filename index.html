<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>The Internet Be Wild</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px 10px;
    background:#0b0f1a;
    color:white;
    font-family:Arial, sans-serif;
}

.container{
    max-width:480px;
    margin:auto;
    text-align:center;
}

h1{
    font-size:26px;
    margin-bottom:15px;
}

.video-box{
    position:relative;
    width:100%;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

.video-box img{
    width:100%;
    display:block;
}

.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,.65);
    width:70px;
    height:70px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:35px;
}

video{
    width:100%;
    max-height:75vh;
    background:#000;
    border-radius:15px;
    display:none;
}

/* sembunyikan tombol fullscreen */
video::-webkit-media-controls-fullscreen-button{
    display:none !important;
}

.desc{
    margin-top:15px;
    font-size:15px;
    color:#ccc;
}
</style>

</head>

<body>

<div class="container">

<h1>The Internet Be Wild</h1>

<div class="video-box" id="thumbnailBox">

    <img src="https://cdn.aceimg.com/RQm0wiwZe.jpg">

    <div class="play-btn">
        ▶
    </div>

</div>


<video id="videoPlayer" controls playsinline preload="metadata">
    <source src="https://cdn.slicedrive.com/U1aNyu4o1.mp4" type="video/mp4">
</video>


<div class="desc">
Watch the full video below
</div>


</div>


<script>

const thumbBox = document.getElementById("thumbnailBox");
const video = document.getElementById("videoPlayer");


thumbBox.onclick = function(){

    thumbBox.style.display="none";

    video.style.display="block";

    video.play();

};


</script>


</body>
</html>
