<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SliceDrive</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#fff;
    color:#111;
}

header{
    max-width:1100px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px;
}

.logo{
    font-size:22px;
    font-weight:700;
}

.upload{
    background:#0d1225;
    color:#fff;
    padding:12px 24px;
    border-radius:30px;
    text-decoration:none;
    font-size:14px;
}

.container{
    max-width:900px;
    margin:20px auto;
    text-align:center;
}

.video-box{
    width:100%;
    max-width:600px;
    margin:auto;
    border-radius:10px;
    overflow:hidden;
    background:#000;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

video{
    width:100%;
    display:block;
    background:#000;
}

.more{
    display:inline-block;
    margin-top:20px;
    color:#3266ff;
    text-decoration:none;
    font-size:17px;
}

footer{
    margin-top:120px;
    text-align:center;
    font-size:12px;
    color:#888;
}

footer a{
    color:#888;
    text-decoration:none;
    margin:0 15px;
}

@media(max-width:700px){

header{
padding:18px;
}

.logo{
font-size:20px;
}

.video-box{
width:95%;
}

}
</style>

</head>
<body>

<header>

<div class="logo">
SliceDrive
</div>

<a href="#" class="upload">
Upload
</a>

</header>

<div class="container">

<div class="video-box">

<video controls playsinline preload="metadata">
<source src="video.mp4" type="video/mp4">
</video>

</div>

<a href="#" class="more">
Proceed for more
</a>

</div>

<footer>

<a href="#">Terms of Service</a>

<a href="#">Report Abuse</a>

</footer>

</body>
</html>
