<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Video</title>

<meta name="description" content="Watch today's featured video.">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
background:#0b0f1a;
color:#fff;
display:flex;
justify-content:center;
padding:30px 15px;
}

.container{
width:100%;
max-width:760px;
}

.card{
background:#151b29;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.header{
padding:22px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:24px;
font-weight:700;
letter-spacing:.5px;
}

.badge{
background:#2563eb;
padding:7px 14px;
border-radius:999px;
font-size:13px;
font-weight:600;
}

.player{
position:relative;
background:#000;
cursor:pointer;
}

.player img{
width:100%;
display:block;
aspect-ratio:16/9;
object-fit:cover;
}

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90px;
height:90px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
transition:.3s;
}

.player:hover .play{
transform:translate(-50%,-50%) scale(1.08);
}

video{
display:none;
width:100%;
background:#000;
max-height:75vh;
}

.content{
padding:25px;
}

.title{
font-size:30px;
font-weight:700;
margin-bottom:10px;
}

.meta{
display:flex;
gap:15px;
flex-wrap:wrap;
color:#9ca3af;
font-size:14px;
margin-bottom:20px;
}

.desc{
line-height:1.7;
color:#d1d5db;
margin-bottom:28px;
}

.button{
display:block;
width:100%;
padding:17px;
background:#2563eb;
color:#fff;
text-decoration:none;
text-align:center;
font-size:18px;
font-weight:700;
border-radius:12px;
transition:.3s;
}

.button:hover{
background:#1d4ed8;
}

footer{
margin-top:20px;
text-align:center;
font-size:13px;
color:#94a3b8;
}

footer a{
color:#94a3b8;
text-decoration:none;
margin:0 8px;
}

footer a:hover{
color:white;
}

@media(max-width:600px){

.title{
font-size:24px;
}

.play{
width:70px;
height:70px;
font-size:34px;
}

.header{
padding:18px;
}

}
</style>

</head>
<body>

<div class="container">

<div class="card">

<div class="header">
<div class="logo">VIDEO HUB</div>
<div class="badge">Featured</div>
</div>

<div class="player" id="thumb">

<img src="thumbnail.jpg" alt="Thumbnail">

<div class="play">▶</div>

</div>

<video id="video" controls playsinline preload="metadata">

<source src="video.mp4" type="video/mp4">

</video>

<div class="content">

<div class="title">
Featured Video
</div>

<div class="meta">

<span>👁 12.8K Views</span>

<span>⭐ 4.9 Rating</span>

<span>📅 Updated Today</span>

</div>

<div class="desc">

Enjoy today's featured video in high quality.
Watch the preview above or continue to the full experience below.

</div>

<a class="button"
href="https://example.com"
target="_blank"
rel="noopener">

Watch Full Video

</a>

</div>

</div>

<footer>

© 2026 Video Hub

<br><br>

<a href="#">Privacy</a>

|

<a href="#">Terms</a>

|

<a href="#">Contact</a>

</footer>

</div>

<script>

const thumb=document.getElementById("thumb");

const video=document.getElementById("video");

thumb.onclick=function(){

thumb.style.display="none";

video.style.display="block";

video.play();

};

</script>

</body>
</html>
